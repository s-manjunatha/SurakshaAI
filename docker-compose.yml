version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: surakshai-postgres
    environment:
      POSTGRES_USER: surakshai
      POSTGRES_PASSWORD: surakshai_secret
      POSTGRES_DB: surakshai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surakshai"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: surakshai-neo4j
    environment:
      NEO4J_AUTH: neo4j/surakshai_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: surakshai-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

volumes:
  postgres_data:
  neo4j_data:
  chroma_data:
